name: Envio Manual de Emails B2B

on:
  workflow_dispatch: 

jobs:
  rodar_script:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Baixar os arquivos do projeto
      uses: actions/checkout@v4

    - name: 2. Configurar o Python na nuvem
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: 3. Instalar as bibliotecas necessarias
      run: |
        pip install pandas python-dotenv

    - name: 4. Executar o envio de emails
      env:
        MEU_EMAIL: ${{ secrets.MEU_EMAIL }}
        SENHA_APP: ${{ secrets.SENHA_APP }}
      run: python main.py